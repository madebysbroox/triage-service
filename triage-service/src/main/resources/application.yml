server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 1MB

spring:
  application:
    name: triage-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

triage:
  provider: mock
  api-key: local-dev-key
  max-body-bytes: 1048576
  log-slicing:
    max-lines: 120
    context-before: 3
    context-after: 6
  gating:
    min-confidence: 0.75
    force-review-severities: HIGH,CRITICAL
  model:
    id: mock-deterministic-v1
